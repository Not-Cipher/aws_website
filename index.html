<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Basic Site</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            line-height: 1.6;
            background: #f9f9f9;
            color: #333;
        }

        header {
            background: #222;
            color: #fff;
            padding: 1.5rem;
            text-align: center;
        }

        nav {
            background: #444;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        nav li {
            margin: 0;
        }

        nav a {
            display: block;
            padding: 1rem;
            color: white;
            text-decoration: none;
        }

        nav a:hover {
            background: #666;
        }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        section {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #ddd;
        }

        h1, h2 {
            margin-top: 0;
        }

        footer {
            text-align: center;
            padding: 1rem;
            background: #222;
            color: #fff;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
        <p>This is a basic static HTML page.</p>
    </header>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Home</h2>
            <p>This is the home section of your website.</p>
        </section>

        <section>
            <h2>About</h2>
            <p>Write something about yourself or your project here.</p>
        </section>

        <section>
            <h2>Contact</h2>
            <p>Email: example@email.com</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

</body>
</html>
